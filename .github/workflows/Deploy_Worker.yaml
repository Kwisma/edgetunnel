          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PAGES_2 }}

      - name: Deploy Worker for ${{ github.ref_name }} PAGES_3
        run: |
          echo "name=\"o9d8b0y7\"" > wrangler.toml
