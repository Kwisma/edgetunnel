          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_MIKUYO }}

  deploy-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Wrangler
        run: |
          npm install -g wrangler
          mkdir dist
          mv 明文源码.js dist/index.js
          rm -rf LICENSE README.md _worker.js wrangler.toml

      - name: Deploy Worker for ${{ github.ref_name }} PAGES_1
        run: |
          echo "name=\"g5w2d5g4\"" > wrangler.toml
          echo "pages_build_output_dir = \"./dist\"" >> wrangler.toml
          echo "[vars]" >> wrangler.toml
          echo "SUB=\"${{ secrets.SUB }}\"" >> wrangler.toml
          echo "SUBAPI=\"${{ secrets.SUBAPI }}\"" >> wrangler.toml
          echo "SUBCONFIG=\"${{ secrets.SUBCONFIG }}\"" >> wrangler.toml
          echo "SUBNAME=\"pages_1_dingyue\"" >> wrangler.toml
          echo "TGID=\"${{ secrets.TGID }}\"" >> wrangler.toml
          echo "TGTOKEN=\"${{ secrets.TGTOKEN }}\"" >> wrangler.toml
          echo "TOKEN=\"N49o8kZF0qp0447j3kyc\"" >> wrangler.toml
          echo "URL=\"${{ secrets.URL }}\"" >> wrangler.toml
          echo "RPROXYIP=\"true\"" >> wrangler.toml
          ls -a
          npx wrangler pages deploy --branch=main --commit-dirty=true
          # npx wrangler pages deploy ./dist --project-name=g5w2d5g4 --branch=main --commit-dirty=true --binding SUB:${{ secrets.SUB }} SUBAPI:${{ secrets.SUBAPI }} SUBCONFIG:${{ secrets.SUBCONFIG }} SUBNAME:"pages_1_dingyue" TGID:${{ secrets.TGID }} TGTOKEN:${{ secrets.TGTOKEN }} TOKEN:N49o8kZF0qp0447j3kyc URL:${{ secrets.URL }} RPROXYIP:true
